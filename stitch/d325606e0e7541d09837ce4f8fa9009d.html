<!DOCTYPE html>

<html class="dark" lang="tr"><head>

                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface-variant": "#2d3449",

                        "outline": "#8d90a0"

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(45, 52, 73, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Content (Partially Visible/Dimmed) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-30 grayscale pointer-events-none">
<header class="flex justify-between items-center px-8 py-4 w-full bg-[#0b1326]">
<div class="text-xl font-black text-white tracking-tight">The Nocturnal Curator</div>
<div class="flex gap-8">
<span class="text-[#c3c6d7]">Keşfet</span>
<span class="text-[#c3c6d7]">Koleksiyonlar</span>
<span class="text-[#c3c6d7]">Kürasyon</span>
</div>
</header>
<main class="p-12">
<div class="grid grid-cols-12 gap-8">
<div class="col-span-8 aspect-[16/9] bg-surface-container rounded-xl overflow-hidden">
<img class="w-full h-full object-cover" data-alt="dramatic architectural perspective of a concrete building at twilight with strong linear shadows and high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMDyWP3gff7bsEckmclGDq2WKDyHtSD1S93papyTBsUotfUw3RfeIURsbjNxFc-negemiASt24tYxvWIhhmgimyhF-ndsNS2iSlDYiJR9cz9FHd2IQNYeYMj6tY7lb-Hb4Wk2JOBFaL_KO0dJm4KHcwwU-0Vuh8qkYMBlYsxPl8i_pUhR-z54MzlRj6n6NvNvnZ5FoDGsCOWppD80UXvjJfrGoEFiLJ0fZkj8FZQoW6nj1rrKie4ASWOaU4ie42uEjo7Izyw9o1xE"/>
</div>
<div class="col-span-4 aspect-square bg-surface-container rounded-xl overflow-hidden">
<img class="w-full h-full object-cover" data-alt="close-up of a single drop of water on a dark leaf surface with soft moonlight reflection and deep teal tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1k6RTR67sTn4twc5n-bfT0H0xQ0P334WjvUjaXRdywNb2bLvAVmcKoZ7YqukoLwALV1ohoAjPG_2Gz2wPHXOl1jz5L_IAnd7_RwDspvBIxf3P1_JcPPFYw1Z8_bn3vMD5flZIM7Y6oMYYCPSnJBWghDxATzcfjd4rAndwAgmnM_tVvojE-74sWKv1IPfYF9MIMN8y3rmv0B5ozEgwfFXX0E_zB21W67sejtIeV1atuguCQ6tn_jbFI-IXqTW-4WQBNVLltIOS9oU"/>
</div>
<div class="col-span-4 aspect-square bg-surface-container rounded-xl overflow-hidden">
<img class="w-full h-full object-cover" data-alt="low angle view of jagged mountain peaks against a deep blue starry night sky with ethereal atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDM7-k52o2psyZeAsdNYS6WfkWJoIHpIKRkJ-41S2P5etkNT4yWnhYgG5gYB2o0asqmy56K8a23490M0J7pe-rnSjiLQ-x9ngRP7E4PkFTWDaYGq0gXXk9dL1Nd00-4ixhr-MB1LvYKWCUqH1Fg7oztH74DdX8nB7Ulu2Mq7n3G5gaPFZXM4vPzn9FSgti-b58J1cR7T1jnMifIFWgvo5kH83q4m1vaarxLlzWc3B8keCm6W0BuHka-yG7PoClXYR3LtnwVpUchcdk"/>
</div>
<div class="col-span-8 aspect-[16/9] bg-surface-container rounded-xl overflow-hidden">
<img class="w-full h-full object-cover" data-alt="vast minimalist landscape of a foggy lake at dawn with silhouettes of lone trees and moody lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDUPSTZNoeQpydE_DoD13TWU2835UdPERYO3xMHLUkHoWQLAU0u-w7XDNNY892pTL3Xw57gD9YfhL2O3VN-tTtw-SQsJ0UHLbZ9IuhjUShGplOeywUPgpiJJcN6YdRSNVIvrn-HO56cwQiDarush98Z_7AmorYaIxo3r7gt_mvgGf1L0ovxvwjSJUpe-RiE0aFKuxSBzqEkOvy5wByeK0KUEQVs-WeM-eWhfhlskZQicGcbXzgECrG-ga6JzewW4Q8zatxgGn48a4"/>
</div>
</div>
</main>
</div>
<!-- Lightbox Modal Overlay -->
<div class="fixed inset-0 z-50 flex flex-col bg-[#060e20]/95 backdrop-blur-sm">
<!-- Top Toolbar -->
<div class="flex justify-between items-center px-8 py-6 w-full z-20">
<div class="flex flex-col">
<span class="text-xs uppercase tracking-widest text-on-surface-variant mb-1 font-medium">Sergi Parçası</span>
<h1 class="text-2xl font-bold tracking-tight text-white">Gece Yarısı Yansıması</h1>
</div>
<button class="glass-panel p-3 rounded-full text-on-surface hover:text-white transition-all active:scale-95 group">
<span class="material-symbols-outlined block group-hover:rotate-90 transition-transform duration-300" data-icon="close">close</span>
</button>
</div>
<!-- Main Display Area -->
<div class="flex-1 relative flex items-center justify-center px-4 md:px-20 overflow-hidden">
<!-- Navigation - Left -->
<button class="absolute left-6 md:left-12 z-20 glass-panel p-4 rounded-full text-on-surface hover:bg-primary-container/20 hover:text-primary transition-all active:scale-90 group">
<span class="material-symbols-outlined text-3xl" data-icon="chevron_left">chevron_left</span>
</button>
<!-- Image Container -->
<div class="relative w-full h-full max-h-[870px] flex items-center justify-center">
<!-- Image with subtle shadow and border-less separation as per system -->
<div class="relative group max-w-full h-full flex items-center justify-center">
<img class="max-w-full max-h-full object-contain rounded-xl shadow-[0_40px_100px_-20px_rgba(0,0,0,0.8)] border border-outline-variant/10" data-alt="cinematic wide shot of misty mountains at night with a single bright star above a sharp peak, deep indigo and black tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXD3xYXU8gueYb6d0idVZ0wCmB49nVQRSjCnmdb3jLoSvWaEx-CcGINHwqBRc9BFoUmZSOutkocsnP8y-r2VG0dKXF_-JNmZb1SFBB6okQr987mydvkdQY-EKfVWCT6sWUGRN_hXLlKKm1eWN6Bm2EA3mTyVBkIp79ApH6hIcLk0Te7CPXdpoO8m0Mlo2B0Xo6va-zjuX1d1maT9Xo3JhiKMXa5JwV8JKUYMSqmw397vv1ml4INClt5b3lK1fZeT_Jgj_xCigTup8"/>
<!-- Floating Tech Specs (Glassmorphism) -->
<div class="absolute top-6 left-6 glass-panel px-4 py-2 rounded-full hidden md:flex items-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" data-icon="camera">camera</span>
<span class="text-[10px] font-bold text-on-surface">ISO 400</span>
</div>
<div class="w-px h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" data-icon="shutter_speed">shutter_speed</span>
<span class="text-[10px] font-bold text-on-surface">1/250s</span>
</div>
</div>
</div>
</div>
<!-- Navigation - Right -->
<button class="absolute right-6 md:right-12 z-20 glass-panel p-4 rounded-full text-on-surface hover:bg-primary-container/20 hover:text-primary transition-all active:scale-90 group">
<span class="material-symbols-outlined text-3xl" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Bottom Metadata & Actions -->
<div class="w-full px-8 py-8 flex flex-col md:flex-row justify-between items-end md:items-center gap-6 z-20">
<div class="flex flex-col gap-3">
<div class="flex gap-2">
<span class="bg-primary-container/20 text-primary-container px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-primary-container/20">Doğa</span>
<span class="bg-surface-container-highest text-on-surface-variant px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Koleksiyon: Sessizlik</span>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="professional portrait of a male photographer with a camera against a neutral studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdmeJblluK_UI5kCVXcmpuNHTTw31l3MKZYO_okzhYNhoY0rzqhHKT1x4-hF3_wUclvaLtPcCmnmkcwnSJeugsvkStj_XBrDqWLpNfWOXw6hwEL3F_q0_MLMJDRbJfCAIM2uWIV3vqKa6iJIo9vn7MnIh94oQNdvSkjkfIs-NZEWzvWW0qvR81DN-YrgIW2qfKtmGkerDiowO-VTvuBdd7TARZ8DDOtoY45aQhC48esAETPwN8qR0lf9MD7TNfTq69q9vCvt4sjTw"/>
</div>
<div class="flex flex-col">
<span class="text-xs text-on-surface-variant">Sanatçı</span>
<span class="text-sm font-bold text-white">Eren Demirci</span>
</div>
</div>
</div>
<!-- Contextual Actions -->
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 px-6 py-3 rounded-xl bg-surface-container-highest text-on-surface hover:bg-surface-bright transition-all group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform" data-icon="favorite">favorite</span>
<span class="text-sm font-bold">Kaydet</span>
</button>
<button class="flex items-center gap-2 px-8 py-3 rounded-xl bg-primary-container text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:brightness-110 transition-all active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="download">download</span>
<span class="text-sm font-bold">Yüksek Çözünürlük</span>
</button>
<button class="glass-panel p-3 rounded-xl text-on-surface hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</div>
<!-- Background Decoration (Corner Gradients) -->
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 blur-[120px] -z-10 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-tertiary/5 blur-[120px] -z-10 pointer-events-none"></div>
</div>
</body></html>
